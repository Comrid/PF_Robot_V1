<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로봇 체험 (AP)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #334155 0%, #1e293b 100%); min-height: 100vh; color: #fff; display: flex; flex-direction: column; }
        .top-bar { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.25); }
        .top-bar a { color: #fbbf24; text-decoration: none; font-size: 0.9rem; }
        .play-wrap { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 10px; max-width: 600px; margin: 0 auto; width: 100%; }
        .image-tabs { display: flex; gap: 8px; }
        .image-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.08); cursor: pointer; font-size: 0.85rem; }
        .image-tab.active { background: rgba(74, 222, 128, 0.35); }
        .image-box { flex: 1; min-height: 180px; background: rgba(0,0,0,0.35); border-radius: 12px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .image-box span { opacity: 0.7; font-size: 0.9rem; padding: 12px; text-align: center; }
        #cameraImage { max-width: 100%; max-height: 100%; display: none; object-fit: contain; }
        #ultrasonicChart { width: 100%; height: 100%; display: none; }
        .joystick-container { display: flex; align-items: center; justify-content: center; gap: 12px; min-height: 200px; }
        .joystick-toggle-btn { padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(74,222,128,0.5); background: rgba(74,222,128,0.25); color: #fff; cursor: pointer; white-space: nowrap; }
        .joystick-toggle-btn.active { background: rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.5); }
        .joystick-area { position: relative; touch-action: none; }
        .joystick-background { width: 100%; height: 100%; border-radius: 12px; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2); position: relative; }
        .joystick-center { position: absolute; left: 50%; top: 50%; width: 56px; height: 56px; margin: -28px 0 0 -28px; border-radius: 50%; background: rgba(255,255,255,0.9); pointer-events: none; display: flex; align-items: center; justify-content: center; }
        .joystick-center.active { background: #4ade80; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/">← Wi-Fi 설정</a>
        <span>{{ robot_name }}</span>
    </div>
    <div class="play-wrap">
        <div class="image-tabs">
            <div class="image-tab active" id="cameraTab">카메라</div>
            <div class="image-tab" id="ultrasonicTab">초음파</div>
        </div>
        <div class="image-box">
            <span id="imageBoxText">시작 후 화면이 표시됩니다</span>
            <img id="cameraImage" alt="camera">
            <canvas id="ultrasonicChart"></canvas>
        </div>
        <div class="joystick-container">
            <button type="button" class="joystick-toggle-btn" id="joystickToggleBtn">
                <span id="joystickToggleText">시작</span>
            </button>
            <div class="joystick-area" id="joystickArea">
                <div class="joystick-background">
                    <div class="joystick-center" id="joystickCenter">◎</div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='ap_play.js') }}"></script>
</body>
</html>
